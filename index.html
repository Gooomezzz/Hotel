<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hotel de Insectos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      height: 600vh;
    }

    #sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-family: sans-serif;
      gap: 1rem;
    }

    #loading-bar-wrap {
      width: 200px;
      height: 3px;
      background: #eee;
      border-radius: 2px;
    }

    #loading-bar {
      height: 100%;
      width: 0%;
      background: #555;
      border-radius: 2px;
      transition: width 0.1s;
    }

    #loading p {
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <p id="loading-text">Cargando...</p>
  </div>

  <div id="sticky">
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const TOTAL_FRAMES = 120; // frames a extraer
    const VIDEO_SRC = 'hotel.mp4';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loadingEl = document.getElementById('loading');
    const loadingBar = document.getElementById('loading-bar');
    const loadingText = document.getElementById('loading-text');

    const frames = [];

    async function extractFrames() {
      const video = document.createElement('video');
      video.src = VIDEO_SRC;
      video.muted = true;
      video.playsInline = true;
      video.crossOrigin = 'anonymous';

      await new Promise(res => {
        video.addEventListener('loadedmetadata', res, { once: true });
        video.load();
      });

      const duration = video.duration;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      for (let i = 0; i < TOTAL_FRAMES; i++) {
        video.currentTime = (i / (TOTAL_FRAMES - 1)) * duration;

        await new Promise(res => {
          video.addEventListener('seeked', res, { once: true });
        });

        const offscreen = document.createElement('canvas');
        offscreen.width = video.videoWidth;
        offscreen.height = video.videoHeight;
        offscreen.getContext('2d').drawImage(video, 0, 0);
        frames.push(offscreen);

        const pct = Math.round((i + 1) / TOTAL_FRAMES * 100);
        loadingBar.style.width = pct + '%';
        loadingText.textContent = `Cargando frames... ${pct}%`;
      }

      loadingEl.style.display = 'none';

      // Pintar primer frame
      ctx.drawImage(frames[0], 0, 0);

      // Scroll
      window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        const maxScroll = document.body.scrollHeight - window.innerHeight;
        const progress = Math.max(0, Math.min(1, scrollTop / maxScroll));
        const index = Math.round(progress * (TOTAL_FRAMES - 1));
        ctx.drawImage(frames[index], 0, 0);
      }, { passive: true });
    }

    extractFrames();
  </script>

</body>
</html>
